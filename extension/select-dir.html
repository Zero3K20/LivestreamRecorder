<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Select Save Directory — Livestream Recorder</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      width: 400px;
      height: 140px;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
    }
    #msg { font-size: 12px; color: #7f8c8d; }
    #btn-pick {
      background: #0f3460;
      color: #e0e0e0;
      border: 1px solid #1a5276;
      border-radius: 4px;
      padding: 7px 18px;
      cursor: pointer;
      font-size: 13px;
    }
    #btn-pick:hover { background: #1a5276; }
    #btn-pick:disabled { background: #333; color: #666; cursor: default; }
  </style>
</head>
<body>
  <div id="msg">Choose where completed recordings will be saved.</div>
  <button id="btn-pick">📂 Choose Directory…</button>
  <script src="select-dir.js"></script>
</body>
</html>
